<h2>{{ profile_user.username }}</h2>

{% if profile.avatar %}
    <img src="{{ profile.avatar.url }}" width="100">
{% endif %}

<p>{{ profile.bio }}</p>

<p>Joined: {{ profile_user.date_joined }}</p>

<h3>Posts:</h3>

<ul>
    {% for post in posts %}
        <li>
            <a href="{% url 'post_detail' post.id %}">
                {{ post.title }}
            </a>
        </li>
    {% endfor %}
</ul>
